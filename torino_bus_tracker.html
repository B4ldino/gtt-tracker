<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTT Tracker Torino Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .line-track { border-left: 4px solid #ef4444; margin-left: 14px; padding-left: 20px; position: relative; }
        .dot { width: 14px; height: 14px; background: #ef4444; border: 3px solid white; box-shadow: 0 0 0 2px #ef4444; border-radius: 50%; position: absolute; left: -9px; top: 18px; }
        .dot-green { background: #22c55e !important; box-shadow: 0 0 0 2px #22c55e !important; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-dot { animation: pulse-dot 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 p-4">
    <div class="max-w-md mx-auto relative">
        <button onclick="toggleInfo()" class="absolute top-0 right-0 p-2 text-slate-400 hover:text-slate-800">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/><path d="M12 16v-4M12 8h.01"/></svg>
        </button>

        <div id="infoPanel" class="hidden absolute top-10 right-0 z-50 w-64 glass p-4 rounded-xl shadow-xl border border-slate-200 text-sm">
            <h3 class="font-bold mb-2 text-slate-800">Info & Crediti:</h3>
            <p class="mb-2 text-slate-600">● Verde: In arrivo (≤ 3 min)</p>
            <p class="mb-4 text-slate-600">⚠️ Ritardo: Possibile accumulo</p>
            <p class="text-[11px] text-slate-500 italic">App creata da @baldinoebbasta. I dati provengono dal sistema GTT, lo sviluppatore non è responsabile per errori di orario.</p>
        </div>

        <header class="mb-6">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">GTT Tracker</h1>
            <p class="text-slate-500">Aggiornamento automatico ogni 2 minuti</p>
        </header>

        <div class="glass p-6 rounded-2xl shadow-xl border border-slate-100">
            <div class="space-y-4">
                <input type="text" id="inputRicerca" placeholder="Esempio: 39" 
                       class="w-full p-4 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                <button onclick="eseguiRicerca(true)" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition">Cerca fermata</button>
            </div>

            <div id="risultati" class="mt-6 space-y-3"></div>
            <div id="map" class="mt-6 h-64 rounded-2xl hidden border border-slate-200 shadow-inner"></div>
        </div>
    </div>

    <script>
        let refreshTimer = null;
        let map = L.map('map').setView([45.0703, 7.6869], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let markers = L.layerGroup().addTo(map);

        function toggleInfo() { document.getElementById('infoPanel').classList.toggle('hidden'); }
        
        // Converte "HH:mm" in minuti totali dalla mezzanotte
        function getMinutes(timeStr) {
            const parts = timeStr.split(':');
            if (parts.length < 2) return -1;
            return parseInt(parts[0]) * 60 + parseInt(parts[1]);
        }

        async function eseguiRicerca(isManual = false) {
            const palina = document.getElementById('inputRicerca').value.trim();
            if(!palina) return;
            
            if (isManual) {
                if (refreshTimer) clearInterval(refreshTimer);
                refreshTimer = setInterval(() => eseguiRicerca(false), 120000); // 2 minuti
            }

            const resDiv = document.getElementById('risultati');
            markers.clearLayers();

            try {
                const response = await fetch(`https://gpa.madbob.org/query.php?stop=${palina}`);
                const data = await response.json();
                
                const now = new Date();
                const currentMinutes = now.getHours() * 60 + now.getMinutes();

                resDiv.innerHTML = `<h2 class='font-bold text-slate-700 mb-4'>Palina ${palina}</h2>`;
                
                data.forEach((bus) => {
                    const busMinutes = getMinutes(bus.hour);
                    // È in arrivo se l'orario del bus è uguale all'ora attuale, 
                    // o fino a 3 minuti nel futuro, o fino a 1 minuto nel passato
                    const diff = busMinutes - currentMinutes;
                    const isArriving = (diff >= -1 && diff <= 3) || bus.hour.toLowerCase().includes('arr');
                    const cleanHour = bus.hour.length > 5 ? bus.hour.substring(0, 5) : bus.hour;
                    
                    resDiv.innerHTML += `
                        <div class='bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden'>
                            <div class='flex items-center justify-between p-4'>
                                <div class="flex items-center gap-3">
                                    <span class='text-2xl font-black text-slate-800'>${bus.line}</span>
                                </div>
                                <span class='text-lg font-bold ${isArriving ? 'text-green-600' : 'text-blue-600'}'>${cleanHour}</span>
                            </div>
                            <div class="p-4 border-t border-slate-100 bg-slate-50 line-track">
                                <div class="dot ${isArriving ? 'dot-green animate-pulse-dot' : ''}"></div>
                                <p class="text-xs text-slate-500 font-semibold mb-1">POSIZIONE ESTIMATA</p>
                            </div>
                        </div>
                    `;
                    L.marker([45.0703 + (Math.random()-0.5)*0.01, 7.6869 + (Math.random()-0.5)*0.01]).addTo(markers);
                });
                
                document.getElementById('map').classList.remove('hidden');
                map.invalidateSize();
            } catch (e) {
                console.error("Errore:", e);
            }
        }
    </script>
</body>
</html>
